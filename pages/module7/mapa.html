<body>
  <!-- Modulo 7 · Mapa interactivo
       Component: hotspot
       data-image:     URL of the background image.
       data-image-alt: Alt text for accessibility.
       data-config:    JSON array of { x, y, label, heading, body } point objects.
                       x and y are percentages (0-100) relative to the image. -->

  <div class="container py-4">
    <h2 class="mb-1" style="color:var(--green-dark);">Mapa interactivo de la ruta de atencion</h2>
    <p class="text-muted mb-4">Haz clic en cada punto para conocer el rol de cada entidad.</p>

    <div data-component="hotspot"
         data-image="/placeholder.svg?width=800&height=380"
         data-image-alt="Mapa de ruta de atencion a victimas de violencia"
         data-config='[
           {"x":15,"y":40,"label":"1","heading":"Denuncia inicial","body":"La victima puede presentar la denuncia ante la Policia, Fiscalia o Comisaria de Familia las 24 horas del dia."},
           {"x":38,"y":55,"label":"2","heading":"Comisaria de Familia","body":"Otorga medidas de proteccion inmediatas y hace seguimiento al caso."},
           {"x":60,"y":35,"label":"3","heading":"ICBF","body":"Interviene cuando hay ninos, ninas o adolescentes involucrados, garantizando su proteccion integral."},
           {"x":80,"y":50,"label":"4","heading":"Fiscalia","body":"Adelanta la investigacion penal y puede solicitar medidas cautelares al juez."}
         ]'>
    </div>

    <!-- Bootstrap accordion as supplementary detail -->
    <h6 class="mt-4 mb-2" style="color:var(--green-dark);">Linea de atencion</h6>
    <div class="accordion" id="linea-atencion">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#linea-body">
            Linea Nacional 155
          </button>
        </h2>
        <div id="linea-body" class="accordion-collapse collapse" data-bs-parent="#linea-atencion">
          <div class="accordion-body">
            La Linea 155 atiende las 24 horas y orienta a las victimas de violencia de genero hacia las instituciones competentes en todo el territorio nacional.
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
