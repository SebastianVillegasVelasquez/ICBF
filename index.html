<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso SCORM</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="app-layout">

    <main class="main-card">

        <header class="card-header">
            <div class="header-content">
                <button id="btn-menu" class="hamburger-btn" title="Menú del curso" aria-label="Abrir menú de navegación">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <h1 class="title">Curso SCORM</h1>

                <nav class="internal-nav">
                    <button id="btn-home" class="icon-btn" title="Inicio">🏠</button>
                    <div class="location-badge">Estás en: <strong id="current-location">Inicio y Generalidades</strong></div>
                    <button class="tab-btn active">PÁGINA <span id="page-num">1</span></button>
                </nav>
            </div>
        </header>

        <!-- Overlay para cerrar el menú -->
        <div id="menu-overlay" class="menu-overlay"></div>

        <!-- Panel de navegación deslizable -->
        <nav id="slide-nav" class="slide-nav" aria-label="Navegación del curso">
            <div class="slide-nav-header">
                <h2 class="slide-nav-title">Contenido del curso</h2>
                <button id="btn-close-menu" class="close-menu-btn" aria-label="Cerrar menú">&times;</button>
            </div>
            <div id="slide-nav-content" class="slide-nav-content">
                <!-- El contenido se genera dinámicamente -->
            </div>
        </nav>

        <section class="content-area">
            <div id="app" class="content-render">
            </div>
        </section>

        <footer class="card-footer">
            <button id="btn-prev" class="control-btn">◀ Anterior</button>
            <div class="footer-spacer"></div>
            <button id="btn-next" class="control-btn">Siguiente ▶</button>
        </footer>

    </main>

    <aside class="sidebar-outer">

        <div class="sidebar-top">
            <img src="assets/img/logo-bienestar.png" alt="ICBF logo" class="floating-logo">
        </div>

        <div class="sidebar-menu">
            <div id="course-nav"></div>
        </div>

        <div class="sidebar-tools">

            <div class="tool-group">
                <span class="label-text" id="progress-text">0%</span>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill" style="height: 0%;"></div>
                </div>
            </div>

<!--            <div class="tool-group">-->
<!--                <button id="btn-mute" class="circle-btn">🔊</button>-->
<!--            </div>-->

            <div class="tool-group">
                <button id="btn-pdf" class="circle-btn" title="Descargar PDF del curso">⬇</button>
                <span class="label-tiny">PDF</span>
            </div>

        </div>
    </aside>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script type="module" src="assets/js/main.js"></script>
</body>
</html>
