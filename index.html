<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso ICBF</title>

  <!-- Path Resolution ANTES de cualquier otro script -->
  <script>
    (function() {
      // Detectar la carpeta base del proyecto
      const currentPath = window.location.pathname;
      const url = new URL(window.location);

      // Buscar dónde termina el proyecto (por index.html o por carpeta)
      let basePath = '';

      // Si estamos en una subcarpeta de public_html
      if (currentPath.includes('/index.html')) {
        basePath = currentPath.substring(0, currentPath.lastIndexOf('/index.html'));
      } else if (currentPath !== '/' && !currentPath.endsWith('.html')) {
        // Estamos en una carpeta
        basePath = currentPath.endsWith('/') ? currentPath.slice(0, -1) : currentPath;
      }

      // Limpiar paths redundantes
      if (basePath && basePath !== '/') {
        // Validar que sea una ruta real (no incluya los assets)
        if (!basePath.includes('assets') && !basePath.includes('css') && !basePath.includes('js')) {
          window.COURSE_BASE_PATH = basePath;
        } else {
          window.COURSE_BASE_PATH = '';
        }
      } else {
        window.COURSE_BASE_PATH = '';
      }

      // Función robusta para resolver rutas
      window.resolvePath = function(path) {
        if (!path) return '';

        // Si ya es absoluta y tiene protocolo, devolverla así
        if (path.startsWith('http://') || path.startsWith('https://')) {
          return path;
        }

        // Limpiar el path
        const cleanPath = path.startsWith('/') ? path.substring(1) : path;

        // Construir la ruta completa
        if (window.COURSE_BASE_PATH) {
          return `${window.COURSE_BASE_PATH}/${cleanPath}`;
        }

        return `/${cleanPath}`;
      };

      console.log('[ICBF] Base Path detectado:', window.COURSE_BASE_PATH);
      console.log('[ICBF] Test resolvePath:', window.resolvePath('assets/img/logo.png'));
    })();
  </script>

  <!-- Preload críticos -->
  <link rel="preload" href="css/main.css" as="style">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style">

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- VELO DE CARGA GLOBAL: bloquea interacción hasta que la app esté lista -->
  <div class="app-loading-veil" id="app-loading-veil">
    <div class="app-loading-content">
      <div class="app-spinner"></div>
      <p>Cargando...</p>
    </div>
  </div>

  <div class="app-shell">

    <!-- LEFT: main content card -->
    <main class="main-card" id="main-card">

      <!-- Chevron progress bar -->
      <div class="progress-bar-container">
        <div class="progress-bar-chevron" id="progress-chevron">
          <div class="progress-bar-fill"></div>
          <div class="progress-bar-percentage" id="progress-percentage">0%</div>
          <div class="progress-bar-arrow"></div>
        </div>
      </div>

      <div class="logo-container">
        <img id="header-logo" src="assets/img/logo.png" alt="Logo ICBF" class="logo">
      </div>

      <!-- Content -->
      <section class="content-area">
        <div id="app" class="content-render"></div>
      </section>

    </main>

    <!-- Vertical pill navigation -->
    <nav class="pill-nav" aria-label="Navegación del curso">
      <button id="btn-home" class="pill-btn" title="Inicio">
        <span class="pill-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </span>
        <span class="pill-label">Inicio</span>
      </button>
      <button id="btn-prev" class="pill-btn" title="Atrás">
        <span class="pill-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </span>
        <span class="pill-label">Atrás</span>
      </button>
      <button id="btn-next" class="pill-btn" title="Adelante">
        <span class="pill-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </span>
        <span class="pill-label">Adelante</span>
      </button>
      <button id="btn-pdf" class="pill-btn" title="Descargar Módulo">
        <span class="pill-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </span>
        <span class="pill-label">Descargar<br>Módulo</span>
      </button>
    </nav>

  </div>

  <!-- Bootstrap 5 JS (required for accordion, collapse, etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
